<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国家经营者 — EJU经济模拟</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --text: #e6edf3;
    --muted: #8b949e;
    --card-bg: #21262d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ===== TITLE SCREEN ===== */
  #screen-title {
    width: 100%; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0d1117 0%, #1a2744 100%);
    text-align: center; padding: 40px 20px;
  }
  #screen-title .logo { font-size: 64px; margin-bottom: 16px; animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  #screen-title h1 { font-size: 2.4em; font-weight: 700; color: var(--accent); margin-bottom: 8px; animation: slideUp 0.6s ease-out 0.2s backwards; }
  #screen-title .subtitle { color: var(--muted); font-size: 1.1em; margin-bottom: 8px; animation: slideUp 0.6s ease-out 0.3s backwards; }
  #screen-title .eju-tag {
    background: #1f4788; color: #79c0ff; 
    border-radius: 20px; padding: 4px 16px; font-size: 0.9em;
    display: inline-block; margin-bottom: 32px;
    animation: slideUp 0.6s ease-out 0.4s backwards;
  }
  #screen-title .desc {
    max-width: 520px; line-height: 1.8; color: var(--muted);
    margin-bottom: 40px; font-size: 1em;
    animation: slideUp 0.6s ease-out 0.5s backwards;
  }

  /* ===== DIFFICULTY SELECT ===== */
  .diff-grid { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }
  .diff-card {
    background: var(--card-bg); border: 2px solid var(--border);
    border-radius: 12px; padding: 20px 28px; cursor: pointer;
    transition: all 0.2s; text-align: center; min-width: 130px;
  }
  .diff-card:hover, .diff-card.selected { border-color: var(--accent); background: #1c2a4a; }
  .diff-card .diff-icon { font-size: 28px; margin-bottom: 8px; }
  .diff-card .diff-name { font-weight: 600; margin-bottom: 4px; }
  .diff-card .diff-desc { color: var(--muted); font-size: 0.82em; }

  /* ===== MAIN GAME SCREEN ===== */
  #screen-game {
    display: none; width: 100%; max-width: 900px;
    padding: 16px; flex-direction: column; gap: 12px;
    animation: fadeIn 0.5s ease-in;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Header */
  .game-header {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 12px;
  }
  .game-header .title-area h2 { font-size: 1.1em; color: var(--accent); }
  .game-header .title-area .year-text { font-size: 0.85em; color: var(--accent); font-weight: 600; margin-top: 0; }
  .year-indicator { display: flex; gap: 3px; flex-wrap: nowrap; }
  .year-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--border); display: flex; align-items: center; justify-content: center;
    font-size: 0.65em; font-weight: 600; color: var(--muted); transition: all 0.3s;
  }
  .year-dot.done { background: rgba(88,166,255,0.2); color: #58a6ff; }
  .year-dot.current { background: var(--accent); color: #fff; box-shadow: 0 0 12px var(--accent); }
  
  /* 12-round year dots optimization */
  @media (max-width: 768px) {
    .year-indicator { gap: 4px; }
    .year-dot { width: 22px; height: 22px; font-size: 0.65em; }
  }

  /* Stats Dashboard - Compact Progress Bar Style */
  .stats-panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    min-height: auto;
  }
  .stats-panel h3 { font-size: 0.8em; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
  .stats-grid { display: flex; flex-direction: column; gap: 10px; }
  .stat-item { 
    display: grid; 
    grid-template-columns: 120px 1fr 50px; 
    align-items: center; 
    gap: 8px; 
    height: auto; 
    padding: 0; 
    background: transparent; 
    border-radius: 0; 
    min-height: 0;
  }
  .stat-label { display: flex; align-items: center; gap: 6px; width: 100%; }
  .stat-name { font-size: 0.8em; color: var(--text); display: flex; align-items: center; gap: 4px; white-space: nowrap; flex-shrink: 0; }
  .stat-val { font-size: 0; font-weight: 700; display: none; }
  .stat-warn { font-size: 0.85em; margin-left: 4px; flex-shrink: 0; }
  .stat-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; position: relative; width: 100%; }
  .stat-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .stat-delta { font-size: 0.75em; text-align: right; height: auto; transition: opacity 0.5s; white-space: nowrap; flex-shrink: 0; }
  .delta-pos { color: var(--green); }
  .delta-neg { color: var(--red); }
  .delta-neutral { color: var(--muted); }

  /* News / Event Card */
  .news-card {
    background: linear-gradient(135deg, #1a2744 0%, #162850 50%, #1a2744 100%);
    border: 1px solid rgba(88,166,255,0.2); border-radius: 12px; padding: 16px;
    border-left: 4px solid var(--accent);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(88,166,255,0.1);
    transition: all 0.3s ease;
  }
  .news-card:hover {
    box-shadow: 0 8px 24px rgba(88,166,255,0.2), inset 0 1px 0 rgba(88,166,255,0.15);
    border-color: rgba(88,166,255,0.4);
  }
  .news-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .news-header .news-icon { font-size: 1.6em; }
  .news-header .news-title { font-size: 1em; font-weight: 600; color: var(--accent); }
  .news-body { line-height: 1.8; color: var(--text); font-size: 0.95em; margin-bottom: 12px; }
  .news-impact {
    background: rgba(0,200,255,0.08); border-radius: 8px; padding: 10px 14px;
    font-size: 0.85em; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
    border: 1px solid rgba(88,166,255,0.15);
    transition: all 0.3s ease;
  }
  .news-impact:hover {
    background: rgba(0,200,255,0.12);
    border-color: rgba(88,166,255,0.3);
  }
  .news-impact .impact-label { color: var(--yellow); font-weight: 600; }
  
  /* News card clickable hint */
  .news-card { cursor: pointer; position: relative; }
  .news-card:hover { background: rgba(0,200,255,0.05); border-color: var(--accent); }
  .news-hint { 
    font-size: 0.75em; color: var(--muted); text-align: center; 
    margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);
    opacity: 0.7;
  }

  /* Policy / Response Section */
  .choice-section { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .choice-section h3 { font-size: 0.85em; color: var(--muted); margin-bottom: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
  .choice-grid { display: flex; flex-direction: column; gap: 8px; }
  
  .choice-card {
    background: linear-gradient(135deg, #1f2a3a 0%, #1a2a42 100%);
    border: 2px solid var(--border); border-radius: 10px; padding: 14px;
    cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .choice-card::before {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(88,166,255,0.1), transparent);
    transition: left 0.6s ease;
  }
  .choice-card:hover {
    border-color: var(--accent);
    background: linear-gradient(135deg, #2d3d4a 0%, #273042 100%);
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(88,166,255,0.25);
  }
  .choice-card:hover::before { left: 100%; }
  .choice-card.selected {
    border-color: var(--accent);
    background: linear-gradient(135deg, #1f4788 0%, #1a3872 100%);
    box-shadow: 0 8px 24px rgba(88,166,255,0.3);
  }
  .choice-card .choice-letter {
    display: inline-block; width: 24px; height: 24px; border-radius: 50%;
    background: var(--border); color: var(--muted); text-align: center; line-height: 24px;
    font-size: 0.75em; font-weight: 700; margin-right: 8px; flex-shrink: 0;
  }
  .choice-card.selected .choice-letter { background: var(--accent); color: #fff; }
  .choice-card .choice-top { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    width: 100%;
    gap: 10px;
  }
  .choice-card .choice-name-area { 
    display: flex; 
    align-items: center; 
    gap: 6px; 
    flex: 1; 
    min-width: 0;
  }
  .choice-card .choice-name { 
    font-weight: 600; 
    font-size: 0.98em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .choice-card .choice-effects {
    margin-top: 8px; margin-left: 36px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .effect-tag {
    font-size: 0.8em; padding: 3px 8px; border-radius: 12px;
    background: #1a1e26; transition: all 0.2s ease;
  }
  .effect-tag:hover { transform: translateY(-2px); }
  .effect-pos { color: var(--green); border: 1px solid #2a4a2a; }
  .effect-neg { color: var(--red); border: 1px solid #4a2020; }
  .effect-neut { color: var(--yellow); border: 1px solid #4a3a00; }

  /* Confirm Button */
  .confirm-btn {
    background: linear-gradient(135deg, var(--accent) 0%, #0084ff 100%);
    color: #fff; border: none; border-radius: 10px; padding: 14px 32px;
    font-size: 1em; font-weight: 600; cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 100%; margin-top: 4px; letter-spacing: 0.05em;
    box-shadow: 0 4px 16px rgba(88,166,255,0.2);
    position: relative; overflow: hidden;
  }
  .confirm-btn::before {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 0; height: 0; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }
  .confirm-btn:not(:disabled):hover {
    background: linear-gradient(135deg, #79c0ff 0%, #00a8ff 100%);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(88,166,255,0.4);
  }
  .confirm-btn:not(:disabled):active::before {
    width: 300px; height: 300px;
  }
  .confirm-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* Knowledge Popup - Desktop */
  .knowledge-popup {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    background: linear-gradient(135deg, #1a2744 0%, #0f1b2e 100%);
    border: 1px solid rgba(88,166,255,0.3); border-radius: 12px;
    padding: 16px 18px; max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(88,166,255,0.1);
    transform: translateY(20px) scale(0.95); opacity: 0; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none; font-size: 0.95em;
  }
  .knowledge-popup.show {
    transform: translateY(0) scale(1);
    opacity: 1; pointer-events: auto;
  }
  .knowledge-popup .kp-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .knowledge-popup .kp-icon { font-size: 1.3em; }
  .knowledge-popup .kp-title { font-size: 1em; font-weight: 700; color: #79c0ff; }
  .knowledge-popup .kp-body { font-size: 0.9em; line-height: 1.7; color: var(--text); margin-bottom: 8px; }
  .knowledge-popup .kp-jp { font-size: 0.85em; color: var(--muted); margin-top: 8px; font-style: italic; }
  .knowledge-popup .kp-close { 
    display: none;
  }
  
  /* Knowledge Info Icon */
  .knowledge-info-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%; 
    background: #1f4788; color: #79c0ff; font-size: 0.7em; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    margin-left: auto; flex-shrink: 0;
  }
  .knowledge-info-icon:hover { background: #2d5fa8; transform: scale(1.1); }
  .knowledge-info-icon.active { background: #00c8ff; }
  
  /* Choice Card - with Knowledge Icon */
  .choice-card .choice-top { display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .choice-card .choice-name-area { display: flex; align-items: center; gap: 8px; flex: 1; }
  .choice-card .choice-name { font-weight: 600; font-size: 0.95em; }
  
  /* Mobile: Knowledge Popup remains desktop-style, just smaller */
  @media (max-width: 768px) {
    .knowledge-popup {
      position: fixed; bottom: auto; right: auto; left: 50%; top: 50%;
      transform: translate(-50%, -50%) translateY(20px); 
      z-index: 999; max-width: 80vw;
      max-height: 60vh; overflow-y: auto;
    }
    .knowledge-popup.show { transform: translate(-50%, -50%) translateY(0); }
  }
  .tutorial-popup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
    z-index: 200; background: #1a2744; border: 2px solid #00c8ff;
    border-radius: 16px; padding: 32px 24px 24px 24px; max-width: 520px; 
    max-height: 85vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    display: flex; flex-direction: column;
  }
  .tutorial-popup.show { opacity: 1; pointer-events: auto; }
  
  /* 弹窗背景遮罩（点击关闭） */
  .popup-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 199; background: rgba(0,0,0,0.5); opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .popup-overlay.show { opacity: 1; pointer-events: auto; }
  .tut-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .tut-icon { font-size: 1.8em; flex-shrink: 0; }
  .tut-title { font-size: 1.2em; font-weight: 700; color: #00c8ff; }
  .tut-body { font-size: 0.95em; line-height: 1.8; color: var(--text); margin-bottom: 16px; flex: 1; overflow-y: auto; }
  .tut-body h3 { color: #00c8ff; font-size: 1em; margin: 12px 0 6px 0; }
  .tut-body p { margin: 8px 0; }
  .tut-body .stat-item { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 0.9em; }
  .tut-body .stat-icon { font-size: 1.2em; width: 24px; }
  .tut-close { 
    position: fixed; z-index: 210; cursor: pointer; color: var(--muted); font-size: 1.5em;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: all 0.2s; top: 12px; right: 12px;
  }
  .tut-close:hover { color: var(--accent); background: rgba(88,166,255,0.1); }
  .tut-btn { 
    width: 100%; padding: 12px; background: linear-gradient(135deg, #00c8ff, #0084ff);
    border: none; border-radius: 8px; color: #fff; font-size: 1em; font-weight: 600;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0; margin-top: 12px;
  }
  .tut-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,200,255,0.3); }
  .tut-btn:active { transform: translateY(0); }
  
  /* ===== 平板教程（481px - 768px）===== */
  @media (max-width: 768px) and (min-width: 481px) {
    .tutorial-popup { 
      max-width: 85vw; 
      max-height: 80vh;
      padding: 28px 18px 16px 18px;
    }
    .tut-close { top: 8px; right: 8px; font-size: 1.3em; }
    .tut-body { font-size: 0.9em; }
    .tut-btn { padding: 10px; font-size: 0.95em; }
  }
  
  /* ===== 手机教程（≤480px）===== */
  @media (max-width: 480px) {
    .tutorial-popup { 
      width: 100vw; 
      max-width: 100vw;
      max-height: 90vh;
      padding: 18px 6px 6px 6px;
      border-radius: 0;
    }
    .tut-close { top: 4px; right: 4px; font-size: 1.2em; width: 36px; height: 36px; }
    .tut-header { margin-bottom: 12px; }
    .tut-icon { font-size: 1.5em; }
    .tut-title { font-size: 1em; }
    .tut-body { font-size: 0.85em; margin-bottom: 12px; }
    .tut-body h3 { font-size: 0.95em; margin: 10px 0 4px 0; }
    .tut-body p { margin: 6px 0; }
    .tut-btn { padding: 9px; font-size: 0.9em; margin-top: 10px; }
  }
  
  /* ===== 超小屏教程（≤360px）===== */
  @media (max-width: 360px) {
    .tutorial-popup { 
      max-width: 95vw;
      max-height: 92vh;
      padding: 20px 12px 12px 12px;
    }
    .tut-close { font-size: 1.1em; width: 32px; height: 32px; }
    .tut-body { font-size: 0.8em; }
    .tut-btn { padding: 8px; font-size: 0.85em; }
  }
  


  /* Result overlay */
  #screen-result {
    display: none; width: 100%; min-height: 100vh;
    align-items: center; justify-content: center;
    flex-direction: column; padding: 40px 20px; text-align: center;
    background: linear-gradient(135deg, #0d1117 0%, #0d2233 100%);
    animation: fadeIn 0.6s ease-in;
  }
  .result-icon { font-size: 80px; margin-bottom: 20px; animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .result-title { font-size: 2.2em; font-weight: 700; color: var(--accent); margin-bottom: 12px; animation: slideUp 0.6s ease-out 0.2s backwards; }
  .result-desc { color: var(--muted); line-height: 1.8; max-width: 500px; font-size: 1em; margin-bottom: 32px; animation: slideUp 0.6s ease-out 0.4s backwards; }
  
  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Breathing Animation - Subtle and elegant */
  @keyframes breathe {
    0%, 100% { 
      box-shadow: 0 0 8px rgba(0,200,255,0.3), inset 0 0 8px rgba(0,200,255,0.1);
    }
    50% { 
      box-shadow: 0 0 20px rgba(0,200,255,0.6), inset 0 0 12px rgba(0,200,255,0.2);
    }
  }

  /* Ripple Effect - Elegant wave on click */
  @keyframes ripple {
    0% {
      box-shadow: 0 0 0 0 rgba(0,200,255,0.6);
    }
    100% {
      box-shadow: 0 0 0 12px rgba(0,200,255,0);
    }
  }

  /* Knowledge Point Icons & Buttons - Aurora Gradient Style */
  .knowledge-info-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, rgba(0,200,255,0.1), rgba(88,166,255,0.1));
    border: 2px solid #00c8ff;
    border-radius: 50%;
    font-size: 1.2em;
    cursor: pointer;
    animation: breathe 3s ease-in-out infinite;
    transition: all 0.3s ease;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .knowledge-info-icon::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
    opacity: 0;
  }

  .knowledge-info-icon:hover {
    background: linear-gradient(135deg, rgba(0,200,255,0.25), rgba(88,166,255,0.25));
    border-color: #79c0ff;
    transform: scale(1.1);
    animation: none;
    box-shadow: 0 0 24px rgba(0,200,255,0.5), inset 0 0 12px rgba(0,200,255,0.2);
  }

  .knowledge-info-icon:active {
    transform: scale(0.95);
    animation: ripple 0.6s ease-out;
  }

  /* News Card Knowledge Button */
  .news-knowledge-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, rgba(0,200,255,0.1), rgba(88,166,255,0.1));
    border: 2px solid #00c8ff;
    border-radius: 50%;
    font-size: 1.2em;
    cursor: pointer;
    animation: breathe 3s ease-in-out infinite;
    transition: all 0.3s ease;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .news-knowledge-btn:hover {
    background: linear-gradient(135deg, rgba(0,200,255,0.25), rgba(88,166,255,0.25));
    border-color: #79c0ff;
    transform: scale(1.1);
    animation: none;
    box-shadow: 0 0 24px rgba(0,200,255,0.5), inset 0 0 12px rgba(0,200,255,0.2);
  }

  .news-knowledge-btn:active {
    transform: scale(0.95);
    animation: ripple 0.6s ease-out;
  }
  .result-stats {

// ===== GAME STATE =====
let state = {
  year: 1,
  maxYears: 6,
  difficulty: 'easy',
  stats: { gdp: 50, cpi: 50, fx: 50, debt: 30, happy: 60 },
  selectedChoice: null,
  currentEvent: null,
  knowledgeLog: new Set(),
  diffMultiplier: 1.0,
};

const STAT_META = [
  { key: 'gdp', name: 'GDP成长率', icon: '📈', good: 'high', unit: '' },
  { key: 'cpi', name: '物价指数', icon: '💴', good: 'mid', unit: '' },
  { key: 'fx', name: '汇率稳定度', icon: '💱', good: 'mid', unit: '' },
  { key: 'debt', name: '国债压力', icon: '🏦', good: 'low', unit: '' },
  { key: 'happy', name: '民众满意度', icon: '😊', good: 'high', unit: '' },
];

function selectDiff(el, diff) {
  document.querySelectorAll('.diff-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  state.difficulty = diff;
}

function startGame() {
  state.year = 1;
  state.stats = { gdp: 50, cpi: 50, fx: 50, debt: 30, happy: 60 };
  state.selectedChoice = null;
  state.knowledgeLog = new Set();
  state.diffMultiplier = state.difficulty === 'easy' ? 0.65 : state.difficulty === 'hard' ? 1.3 : 1.0;

  document.getElementById('screen-title').style.display = 'none';
  document.getElementById('screen-result').style.display = 'none';
  const gs = document.getElementById('screen-game');
  gs.style.display = 'flex';

  renderYearDots();
  renderStats(null);
  showTutorial(); // 显示新手教程
  loadRound();
}

function renderYearDots() {
  const container = document.getElementById('year-dots');
  container.innerHTML = '';
  for (let i = 1; i <= state.maxYears; i++) {
    const dot = document.createElement('div');
    dot.className = 'year-dot' + (i < state.year ? ' done' : i === state.year ? ' current' : '');
    dot.textContent = i;
    container.appendChild(dot);
  }
  document.getElementById('year-text').textContent = `第${state.year}届任期 / 共${state.maxYears}届`;
}

function renderStats(deltas) {
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = '';
  STAT_META.forEach(m => {
    const val = Math.round(state.stats[m.key]);
    const clampedVal = Math.max(0, Math.min(100, val));
    
    let fillColor = '#58a6ff';
    let warningEmoji = '✓';
    if (m.good === 'high') {
      fillColor = val >= 55 ? '#3fb950' : val >= 35 ? '#d29922' : '#f85149';
      warningEmoji = val >= 55 ? '✓' : val >= 35 ? '⚠️' : '🚨';
    } else if (m.good === 'low') {
      fillColor = val <= 45 ? '#3fb950' : val <= 65 ? '#d29922' : '#f85149';
      warningEmoji = val <= 45 ? '✓' : val <= 65 ? '⚠️' : '🚨';
    } else {
      fillColor = (val >= 35 && val <= 65) ? '#3fb950' : (val >= 20 && val <= 80) ? '#d29922' : '#f85149';
      warningEmoji = (val >= 35 && val <= 65) ? '✓' : (val >= 20 && val <= 80) ? '⚠️' : '🚨';
    }

    let delta = deltas ? deltas[m.key] || 0 : 0;
    let deltaHtml = '';
    if (delta > 0) deltaHtml = `<span class="delta-pos">▲${Math.abs(Math.round(delta))}</span>`;
    else if (delta < 0) deltaHtml = `<span class="delta-neg">▼${Math.abs(Math.round(delta))}</span>`;
    else if (deltas) deltaHtml = `<span class="delta-neutral">—</span>`;

    grid.innerHTML += `
      <div class="stat-item">
        <div class="stat-label">
          <span class="stat-name">${m.icon} ${m.name}</span>
          <span class="stat-val" style="color:${fillColor}">${clampedVal}</span>
          <span class="stat-warn">${warningEmoji}</span>
        </div>
        <div class="stat-bar"><div class="stat-fill" style="width:${clampedVal}%;background:${fillColor}"></div></div>
        <div class="stat-delta">${deltaHtml}</div>
      </div>
    `;
  });
}

function loadRound() {
  state.selectedChoice = null;
  document.getElementById('confirm-btn').disabled = true;

  // Pick event (avoid repeating if possible)
  const shuffled = [...EVENTS].sort(() => Math.random() - 0.5);
  state.currentEvent = shuffled[0];

  // Apply event impact
  const eventDeltas = {};
  Object.keys(state.currentEvent.impact).forEach(k => {
    const delta = state.currentEvent.impact[k] * state.diffMultiplier;
    state.stats[k] = Math.max(0, Math.min(100, state.stats[k] + delta));
    eventDeltas[k] = delta;
  });

  // Clamp
  Object.keys(state.stats).forEach(k => {
    state.stats[k] = Math.max(0, Math.min(100, state.stats[k]));
  });

  renderStats(eventDeltas);
  renderEvent();
  renderChoices(state.currentEvent.choices);
  if (state.currentEvent.knowledgeKey) state.knowledgeLog.add(state.currentEvent.knowledgeKey);
}

function renderEvent() {
  const ev = state.currentEvent;
  document.getElementById('news-icon').textContent = ev.icon;
  document.getElementById('news-title').textContent = `第${state.year}年度新闻简报 · ${ev.title}`;
  document.getElementById('news-body').textContent = ev.body;
  
  const impactEl = document.getElementById('news-impact');
  // Build impact html
  let impactHtml = '<span class="impact-label">⚠️ 市场冲击：</span>' + ev.impactText;
  impactEl.innerHTML = impactHtml;
}

// 点击新闻卡显示知识点
function showKnowledgeFromNews() {
  const ev = state.currentEvent;
  if (ev && ev.knowledgeKey) {
    showKnowledge(ev.knowledgeKey);
  }
}

function renderChoices(choices) {
  const grid = document.getElementById('choice-grid');
  grid.innerHTML = '';
  choices.forEach((c, i) => {
    const effectTags = c.effectLabels.map(l => {
      const cls = l.includes('+') ? 'effect-pos' : l.includes('-') ? 'effect-neg' : 'effect-neut';
      return `<span class="effect-tag ${cls}">${l}</span>`;
    }).join('');

    const k = c.knowledgeKey ? KNOWLEDGE[c.knowledgeKey] : null;

    grid.innerHTML += `
      <div class="choice-card" data-idx="${i}" onclick="selectChoice(this, ${i})">
        <div class="choice-top">
          <div class="choice-name-area">
            <span class="choice-letter">${c.letter}</span>
            <span class="choice-name">${c.name}</span>
          </div>
          ${k ? `<span class="knowledge-info-icon" onclick="event.stopPropagation(); showKnowledgePopup(${i})" title="点击查看知识点">ℹ️</span>` : ''}
        </div>
        <div class="choice-effects">${effectTags}</div>
      </div>
    `;
  });
}

function selectChoice(el, idx) {
  document.querySelectorAll('.choice-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  state.selectedChoice = idx;
  document.getElementById('confirm-btn').disabled = false;
  
  // 不自动弹出，让用户主动点击 [ℹ️]
}

function confirmChoice() {
  if (state.selectedChoice === null) return;

  const choice = state.currentEvent.choices[state.selectedChoice];
  if (choice.knowledgeKey) state.knowledgeLog.add(choice.knowledgeKey);

  // Apply choice effects
  const choiceDeltas = {};
  Object.keys(choice.effects).forEach(k => {
    const delta = choice.effects[k] * state.diffMultiplier;
    state.stats[k] = Math.max(0, Math.min(100, state.stats[k] + delta));
    choiceDeltas[k] = delta;
  });

  // Natural reversion toward 50 (stronger for 12-round game)
  Object.keys(state.stats).forEach(k => {
    const reversion = (50 - state.stats[k]) * 0.12;
    state.stats[k] = Math.max(0, Math.min(100, state.stats[k] + reversion));
    if (!choiceDeltas[k]) choiceDeltas[k] = reversion;
  });

  renderStats(choiceDeltas);

  // Check early game over
  if (state.stats.happy <= 5) {
    setTimeout(() => showResult('collapse'), 600);
    return;
  }
  if (state.stats.debt >= 92) {
    setTimeout(() => showResult('bankrupt'), 600);
    return;
  }

  state.year++;
  if (state.year > state.maxYears) {
    setTimeout(() => showResult('end'), 600);
  } else {
    setTimeout(() => {
      renderYearDots();
      loadRound();
    }, 700);
  }
}

function showKnowledgePopup(choiceIdx) {
  const choice = state.currentEvent.choices[choiceIdx];
  if (!choice || !choice.knowledgeKey) return;
  
  const k = KNOWLEDGE[choice.knowledgeKey];
  if (!k) return;
  
  document.getElementById('kp-body').textContent = k.body;
  document.getElementById('kp-jp').textContent = `📖 EJU键词：${k.jp}`;
  const kpTitle = document.querySelector('.kp-title');
  if (kpTitle) kpTitle.textContent = k.name;
  
  const popup = document.getElementById('kpopup');
  popup.classList.add('show');
  
  clearTimeout(popup._timer);
  popup._timer = setTimeout(() => {
    popup.classList.remove('show');
  }, 6000);
}

function showKnowledge(key) {
  const k = KNOWLEDGE[key];
  if (!k) return;
  document.getElementById('kp-body').textContent = k.body;
  document.getElementById('kp-jp').textContent = `📖 EJU键词：${k.jp}`;
  const popup = document.getElementById('kpopup');
  const kpTitle = popup.querySelector('.kp-title');
  if (kpTitle) kpTitle.textContent = k.name;
  
  popup.classList.add('show');
  clearTimeout(popup._timer);
  
  const closeDelay = 6000;
  popup._timer = setTimeout(() => {
    popup.classList.remove('show');
  }, closeDelay);
}

function closeKnowledge() {
  const popup = document.getElementById('kpopup');
  if (popup) popup.classList.remove('show');
}

function showResult(reason) {
  const s = state.stats;
  document.getElementById('screen-game').style.display = 'none';
  const rs = document.getElementById('screen-result');
  rs.style.display = 'flex';

  let ending;
  if (reason === 'collapse') {
    ending = { icon: '🗳️', title: '民心尽失', desc: '民众愤怒已达顶点。街头抗议蔓延，议会通过不信任案，你被迫提前卸任。历史将记住这段动荡岁月。', color: '#f85149' };
  } else if (reason === 'bankrupt') {
    ending = { icon: '💸', title: '财政破产', desc: '国债山积，利率飙升，政府已无力偿债。国际货币基金组织介入，国家陷入前所未有的财政危机。', color: '#f85149' };
  } else {
    // Calculate composite score
    const gdpScore = s.gdp;
    const cpiScore = 100 - Math.abs(s.cpi - 50) * 2;
    const fxScore = 100 - Math.abs(s.fx - 50) * 2;
    const debtScore = 100 - s.debt;
    const happyScore = s.happy;
    const total = (gdpScore * 0.25 + cpiScore * 0.15 + fxScore * 0.15 + debtScore * 0.2 + happyScore * 0.25);

    if (total >= 72 && s.happy >= 65) {
      ending = { icon: '🏆', title: '经济奇迹', desc: '你的经济政策成效卓著，GDP稳步增长，物价平稳，民心凝聚。国际社会将你的施政经验誉为"发展奇迹"，你将被载入史册。', color: '#3fb950' };
    } else if (s.cpi >= 80) {
      ending = { icon: '🌀', title: '通胀噩梦', desc: '物价飞涨，货币购买力大幅缩水。民众抱怨生活成本难以承受，你的任期以通货膨胀危机画上句号。', color: '#d29922' };
    } else if (s.gdp <= 28) {
      ending = { icon: '📉', title: '经济衰退', desc: '经济陷入长期低谷，失业率高企，通缩阴影笼罩。你的继任者将面临一个千疮百孔的烂摊子。', color: '#f85149' };
    } else if (total >= 58) {
      ending = { icon: '📈', title: '稳健发展', desc: '国家在你手中保持了相对稳健的发展势头。没有惊天动地，但民众生活切实改善，这本身就是一种成就。', color: '#58a6ff' };
    } else {
      ending = { icon: '🌥️', title: '波折任期', desc: '任期内经历了不少风波，经济的起伏考验了所有人的耐心。有得有失，历史会给出更公正的评价。', color: '#d29922' };
    }
  }

  document.getElementById('result-icon').textContent = ending.icon;
  document.getElementById('result-title').textContent = ending.title;
  document.getElementById('result-title').style.color = ending.color;
  document.getElementById('result-desc').textContent = ending.desc;

  // Final stats
  const statsEl = document.getElementById('result-stats');
  statsEl.innerHTML = STAT_META.map(m => {
    const v = Math.round(Math.max(0, Math.min(100, state.stats[m.key])));
    let col = '#58a6ff';
    if (m.good === 'high') col = v >= 55 ? '#3fb950' : v >= 35 ? '#d29922' : '#f85149';
    else if (m.good === 'low') col = v <= 45 ? '#3fb950' : v <= 65 ? '#d29922' : '#f85149';
    else col = (v >= 35 && v <= 65) ? '#3fb950' : '#d29922';
    return `<div class="result-stat-item">
      <div class="rs-icon">${m.icon}</div>
      <div class="rs-name">${m.name}</div>
      <div class="rs-val" style="color:${col}">${v}</div>
    </div>`;
  }).join('');

  // Knowledge list
  const knList = document.getElementById('knowledge-list');
  const keys = Array.from(state.knowledgeLog);
  if (keys.length === 0) {
    knList.innerHTML = '<div style="color:var(--muted);font-size:0.85em">暂无记录</div>';
  } else {
    knList.innerHTML = keys.map(k => {
      const info = KNOWLEDGE[k];
      if (!info) return '';
      return `<div class="kl-item">
        <span class="kl-badge">${info.jp.split('・')[0]}</span>
        <span class="kl-text"><strong>${info.name}</strong>：${info.body.substring(0, 60)}…</span>
      </div>`;
    }).join('');
  }
}
